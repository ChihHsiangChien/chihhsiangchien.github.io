<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>115年童軍闖關活動 - 終極挑戰賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#d1d5db 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            touch-action: manipulation;
            margin: 0;
            overflow-x: hidden;
        }

        .scout-green {
            background-color: #2D5A27;
            color: white;
        }

        .scout-brown {
            background-color: #5D4037;
        }

        .scout-gold {
            background-color: #FFD700;
            color: #333;
        }

        .difficulty-tab.active {
            background-color: #2D5A27;
            color: white;
            border-color: #2D5A27;
        }

        /* Iframe styling */
        #game-frame {
            width: 100%;
            height: calc(100dvh - 180px);
            /* Leave room for header/progress */
            border: none;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Hide elements utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="min-h-[100dvh] flex flex-col">

    <!-- Screen 1: Menu Screen -->
    <div id="menu-screen" class="flex-grow flex flex-col items-center">
        <header class="w-full scout-green text-white py-6 px-4 shadow-lg relative overflow-hidden text-center">
            <div class="relative z-10">
                <h1 class="text-3xl md:text-4xl font-extrabold mb-2 tracking-tight">115年童軍闖關活動</h1>
                <p class="text-lg md:text-xl text-yellow-300 font-bold">數位終極挑戰賽 (三關連闖)</p>
            </div>
            <div
                class="absolute top-0 right-0 w-64 h-64 scout-brown opacity-20 -rotate-45 translate-x-32 -translate-y-32">
            </div>
        </header>

        <main class="max-w-4xl w-full mx-auto px-4 mt-4 flex-grow flex flex-col items-center justify-center">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-4 italic text-green-700">--- 選擇你的挑戰級別 ---</h2>

            <div class="flex flex-wrap justify-center gap-3 mb-6 w-full max-w-2xl">
                <button onclick="setDifficulty('lv1')" id="btn-lv1"
                    class="difficulty-tab active px-4 py-2 rounded-xl border-2 border-gray-300 font-bold text-lg md:text-xl transition-all hover:bg-gray-200">初級
                    <span class="block text-sm font-normal">(小學中低年級)</span></button>
                <button onclick="setDifficulty('lv2')" id="btn-lv2"
                    class="difficulty-tab px-4 py-2 rounded-xl border-2 border-gray-300 font-bold text-lg md:text-xl transition-all hover:bg-gray-200">中級
                    <span class="block text-sm font-normal">(小學高年級)</span></button>
                <button onclick="setDifficulty('lv3')" id="btn-lv3"
                    class="difficulty-tab px-4 py-2 rounded-xl border-2 border-gray-300 font-bold text-lg md:text-xl transition-all hover:bg-gray-200">高級
                    <span class="block text-sm font-normal">(國中)</span></button>
                <button onclick="setDifficulty('lv4')" id="btn-lv4"
                    class="difficulty-tab px-4 py-2 rounded-xl border-2 border-gray-300 font-bold text-lg md:text-xl transition-all hover:bg-gray-200">專業級
                    <span class="block text-sm font-normal">(高中職)</span></button>
            </div>

            <div
                class="bg-white p-4 md:p-6 rounded-xl shadow-md border-l-4 border-green-600 w-full max-w-2xl mb-6 text-sm md:text-base">
                <h3 class="font-bold text-lg mb-2">🎈 任務說明</h3>
                <p class="text-gray-600 mb-2">按下開始後，你將依序面對 3 個童軍數位關卡的考驗：</p>
                <ol class="list-decimal list-inside text-gray-700 space-y-1 ml-2 mb-2">
                    <li><strong>台灣地圖拼圖</strong> (空間智力)</li>
                    <li><strong>數字成語遊戲</strong> (國語文采)</li>
                    <li><strong>國旗大師測驗</strong> (世界觀念)</li>
                </ol>
                <p class="text-green-700 font-bold mt-2">👉 答錯選項會自動刪除，保障過關！過關後會自動進入下一關！</p>
            </div>

            <button onclick="startGame()"
                class="scout-gold text-xl md:text-2xl px-10 py-3 md:py-4 rounded-full font-extrabold shadow-lg hover:bg-yellow-400 transition-transform hover:scale-105 active:scale-95 mb-6">
                開始挑戰
            </button>
        </main>
    </div>

    <!-- Screen 2: Game Screen -->
    <div id="game-screen" class="hidden flex-grow flex flex-col h-screen max-h-screen">
        <!-- Progress Header -->
        <header class="scout-green text-white px-4 py-3 flex justify-between items-center shadow-md flex-shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="quitGame()" class="text-white hover:text-gray-300 font-bold text-xl">← 退回主選單</button>
            </div>
            <div class="text-center font-bold text-xl hidden md:block" id="current-game-title">
                載入中...
            </div>
            <div class="bg-green-800 px-4 py-1.5 rounded-full font-bold border border-green-600">
                關卡進度: <span id="progress-text" class="text-yellow-300">1 / 3</span>
            </div>
        </header>

        <!-- Game Info Mobile -->
        <div class="bg-gray-800 text-white text-center py-1 font-bold md:hidden text-sm" id="current-game-title-mobile">
            載入中...
        </div>

        <!-- iframe Container -->
        <main class="flex-grow p-2 md:p-4 bg-gray-200 overflow-hidden flex justify-center items-center">
            <iframe id="game-frame" src="" title="童軍闖關" allow="autoplay"></iframe>
        </main>
    </div>

    <!-- Modal: Inter-stage Message -->
    <div id="message-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modal-icon" class="text-6xl mb-4">🏆</div>
            <h2 id="modal-title" class="text-2xl font-bold mb-2">恭喜過關！</h2>
            <p id="modal-desc" class="text-gray-600 mb-6">你真棒！準備好迎接下一個挑戰了嗎？</p>
            <button id="modal-btn" onclick="nextAction()"
                class="w-full py-3 rounded-lg font-bold text-white shadow-md transition-colors scout-green hover:bg-green-800">
                下一關
            </button>
        </div>
    </div>

    <!-- Modal: Final Victory -->
    <div id="final-modal" class="modal-overlay hidden">
        <div class="modal-content border-t-8 border-yellow-400">
            <div class="text-7xl mb-4">🎉🥇🎉</div>
            <h2 class="text-3xl font-extrabold text-green-700 mb-2">終極榮耀</h2>
            <p class="text-gray-700 mb-6 font-bold">恭喜你全數通過 3 大考驗！<br>你已經具備了「智、仁、勇」的精神！</p>
            <button onclick="quitGame()"
                class="scout-gold text-gray-800 w-full py-3 rounded-lg font-bold shadow-md hover:bg-yellow-400 transition-colors">
                回到首頁
            </button>
        </div>
    </div>


    <script>
        // Game sequences
        const GAME_SEQUENCE = [
            { id: 'map', path: 'taiwan-map-puzzle/index.html', title: '第 1 關：台灣地圖拼圖' },
            { id: 'idiom', path: 'number-idiom-game/index.html', title: '第 2 關：數字成語遊戲' },
            { id: 'flag', path: 'flag-quiz/index.html', title: '第 3 關：國旗大師測驗' }
        ];

        let state = {
            difficulty: 'lv1',
            currentLevelIndex: 0,
            modalAction: 'next' // 'next' or 'retry'
        };

        // --- Setup ---
        function setDifficulty(lv) {
            document.querySelectorAll('.difficulty-tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lv}`).classList.add('active');
            state.difficulty = lv;
        }

        // --- Flow Control ---
        function startGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            state.currentLevelIndex = 0;
            loadCurrentGame();
        }

        function quitGame() {
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('final-modal').classList.add('hidden');
            document.getElementById('message-modal').classList.add('hidden');

            // Clear iframe memory
            document.getElementById('game-frame').src = '';
        }

        function loadCurrentGame() {
            const game = GAME_SEQUENCE[state.currentLevelIndex];

            // Update UI
            document.getElementById('progress-text').textContent = `${state.currentLevelIndex + 1} / 3`;
            document.getElementById('current-game-title').textContent = game.title;
            document.getElementById('current-game-title-mobile').textContent = game.title;

            // Load iframe with difficulty param
            const iframe = document.getElementById('game-frame');
            iframe.src = `${game.path}?diff=${state.difficulty}`;

            // Reset focus to iframe (helps with some keyboard games)
            setTimeout(() => iframe.focus(), 500);
        }

        // --- Modal Logic ---
        function showModal(type) {
            const modal = document.getElementById('message-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const btn = document.getElementById('modal-btn');

            modal.classList.remove('hidden');

            if (type === 'win') {
                icon.textContent = '🏅';
                title.textContent = '完美過關！';
                title.className = 'text-2xl font-bold mb-2 text-green-600';

                if (state.currentLevelIndex === GAME_SEQUENCE.length - 1) {
                    // This was the last level
                    modal.classList.add('hidden');
                    document.getElementById('final-modal').classList.remove('hidden');
                } else {
                    desc.textContent = '準備好迎接下一關了嗎？';
                    btn.textContent = '挑戰下一關 →';
                    btn.className = 'w-full py-3 rounded-lg font-bold text-white shadow-md transition-colors scout-green hover:bg-green-800';
                    state.modalAction = 'next';
                }
            }
        }

        function nextAction() {
            document.getElementById('message-modal').classList.add('hidden');
            if (state.modalAction === 'next') {
                state.currentLevelIndex++;
                loadCurrentGame();
            } else if (state.modalAction === 'retry') {
                // Reload current iframe
                loadCurrentGame();
            }
        }

        // --- postMessage Event Listener ---
        window.addEventListener('message', (event) => {
            // Validate message
            if (event.data && event.data.type === 'scout-game') {
                console.log('Received Game State:', event.data.status);

                if (event.data.status === 'win') {
                    showModal('win');
                }
            }
        });

    </script>
</body>

</html>

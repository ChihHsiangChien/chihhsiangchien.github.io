<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孟德爾遺傳法則考驗</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Outfit:wght@300;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Success Screen -->
        <div id="success-overlay" class="overlay hidden">
            <div class="modal success-modal">
                <div class="confetti"></div>
                <h2>🎊 太棒了！</h2>
                <p>你已經成功掌握了多代遺傳法則！</p>
                <div class="final-score">得分：<span id="display-final-score">0</span></div>
                <button id="restart-game-btn" class="primary-btn">再玩一次</button>
            </div>
        </div>

        <header>
            <div class="title-group">
                <h1>遺傳學實驗室</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">得分</span>
                    <span id="score" class="value">0</span>
                </div>
                <button id="reset-btn" class="action-btn danger small">重設實驗室</button>
            </div>
        </header>

        <main>
            <section class="lab-workspace">
                <!-- Parent Zone (P) -->
                <div class="zone parent-zone">
                    <div class="zone-header">
                        <h3>親代 P</h3>
                        <div id="current-trait-label" class="trait-badge"></div>
                    </div>
                    <div id="parent-container" class="sandbox dropzone-target">
                        <!-- Free-form positioning -->
                    </div>
                </div>

                <!-- Middle Zone (Reproduction Station and F1) -->
                <div class="zone middle-zone">
                    <div class="repro-station">
                        <h3>生殖區</h3>
                        <div id="reproduction-dropzone" class="dropzone dropzone-target">
                            <span class="drop-hint">拖曳兩個個體至此</span>
                        </div>
                        <div class="actions">
                            <button id="repro-btn" class="action-btn primary" disabled>開始生殖</button>
                            <button id="clear-btn" class="action-btn danger">清除畫面</button>
                        </div>
                    </div>

                    <div class="offspring-station">
                        <h3>子代區 (F1/F2...)</h3>
                        <div id="offspring-container" class="sandbox dropzone-target">
                            <!-- New offspring appear here -->
                        </div>
                    </div>
                </div>

                <!-- Classification Zone -->
                <div class="zone classification-zone">
                    <div class="classification-header">
                        <h3>基因型考驗區</h3>
                        <button id="check-btn" class="action-btn success">驗證</button>
                    </div>
                    <div id="genotype-buckets" class="genotype-slots">
                        <div class="slot" data-genotype="AA" id="slot-AA">
                            <div class="slot-header">同型顯性 (AA)</div>
                            <div class="slot-body sandbox dropzone-target"></div>
                        </div>
                        <div class="slot" data-genotype="AB" id="slot-AB">
                            <div class="slot-header">異型 (Aa)</div>
                            <div class="slot-body sandbox dropzone-target"></div>
                        </div>
                        <div class="slot" data-genotype="BB" id="slot-BB">
                            <div class="slot-header">同型隱性 (aa)</div>
                            <div class="slot-body sandbox dropzone-target"></div>
                        </div>
                    </div>

                    <!-- Breed Mode Target Container -->
                    <div id="target-container" class="hidden flex-col items-center justify-center h-full w-full mt-8">
                        <h2
                            class="text-xl font-bold text-gray-700 mb-6 bg-yellow-100 px-4 py-2 rounded shadow text-center leading-relaxed">
                            目標個體<br><span class="text-sm font-normal text-gray-600">請繁殖出具有相同基因型的後代</span></h2>
                        <div id="target-blob-display" class="relative w-40 h-40 scale-125"></div>
                    </div>
                </div>
            </section>
        </main>

    </div>

    <!-- Template for the Blob SVG -->
    <template id="blob-template">
        <div class="blob-sprite" draggable="true">
            <svg viewBox="-10 -15 60 70" class="blob-svg" style="overflow: visible;">
                <defs>
                    <radialGradient id="bodyGradient" cx="40%" cy="40%" r="50%" fx="30%" fy="30%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
                        <stop offset="100%" stop-color="#000000" stop-opacity="0.05" />
                    </radialGradient>
                    <!-- Antenna Tips -->
                    <symbol id="diamond-tip" viewBox="0 0 10 10">
                        <path d="M5 0 L10 5 L5 10 L0 5 Z" />
                    </symbol>
                    <symbol id="star-tip" viewBox="0 0 10 10">
                        <path d="M5 0 L6 4 L10 5 L6 6 L5 10 L4 6 L0 5 L4 4 Z" />
                    </symbol>
                </defs>

                <!-- Wings -->
                <g class="wings" style="pointer-events: none; opacity: 0.6;">
                    <path d="M10 15 Q-15 0 0 10 Q-15 20 10 25" class="wing wing-left fairy-wing" style="display:none;"
                        fill="#fff" stroke="#ccc" />
                    <path d="M30 15 Q55 0 40 10 Q55 20 30 25" class="wing wing-right fairy-wing" style="display:none;"
                        fill="#fff" stroke="#ccc" />
                    <path d="M10 15 L-5 5 L5 15 L-8 25 Z" class="wing wing-left bat-wing" style="display:none;"
                        fill="#333" />
                    <path d="M30 15 L45 5 L35 15 L48 25 Z" class="wing wing-right bat-wing" style="display:none;"
                        fill="#333" />
                </g>

                <!-- Tail -->
                <g class="tail-group" style="pointer-events: none;">
                    <path d="M 6 32 C -8 32 -10 46 2 46 C 7 46 10 40 5 36" fill="none" stroke="#555" stroke-width="3.5"
                        stroke-linecap="round" class="tail" />
                </g>

                <!-- Ears -->
                <path d="M2 12 Q-4 -4 8 4" class="ear left-ear" fill="var(--blob-main-color)" stroke="rgba(0,0,0,0.15)"
                    stroke-width="1.5" />
                <path d="M38 12 Q44 -4 32 4" class="ear right-ear" fill="var(--blob-main-color)"
                    stroke="rgba(0,0,0,0.15)" stroke-width="1.5" />

                <circle cx="20" cy="20" r="18" class="blob-body" />
                <circle cx="20" cy="20" r="18" fill="url(#bodyGradient)" pointer-events="none" />

                <!-- Body Patterns -->
                <g class="body-patterns" style="pointer-events: none;">
                    <g class="spots-group">
                        <!-- More organic scattered speckles -->
                        <circle cx="8" cy="8" r="2.2" class="pattern-item" />
                        <circle cx="14" cy="6" r="1.5" class="pattern-item" />
                        <circle cx="28" cy="7" r="1.8" class="pattern-item" />
                        <circle cx="34" cy="12" r="2" class="pattern-item" />
                        <circle cx="6" cy="28" r="1.8" class="pattern-item" />
                        <circle cx="10" cy="34" r="2.2" class="pattern-item" />
                        <circle cx="30" cy="32" r="1.5" class="pattern-item" />
                        <circle cx="36" cy="26" r="2" class="pattern-item" />
                    </g>
                    <g class="stripes-group">
                        <path d="M6 16 L14 16" fill="none" class="pattern-item stripe-1" stroke-width="3"
                            stroke-linecap="round" />
                        <path d="M26 16 L34 16" fill="none" class="pattern-item stripe-2" stroke-width="3"
                            stroke-linecap="round" />
                        <path d="M6 24 L14 24" fill="none" class="pattern-item stripe-3" stroke-width="3"
                            stroke-linecap="round" />
                        <path d="M26 24 L34 24" fill="none" class="pattern-item stripe-4" stroke-width="3"
                            stroke-linecap="round" />
                    </g>
                </g>

                <g class="antennas">
                    <g class="left-ant-full">
                        <path d="M12 4 Q8 -8 2 -4" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round"
                            class="antenna-path left-ant" />
                        <circle cx="2" cy="-4" r="2.5" fill="#444" class="ant-end left-ant-end round-end" />
                        <use href="#diamond-tip" x="-0.5" y="-6.5" width="5" height="5"
                            class="ant-end left-ant-end diamond-end" style="display:none;" />
                    </g>
                    <g class="right-ant-full">
                        <path d="M28 4 Q32 -8 38 -4" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round"
                            class="antenna-path right-ant" />
                        <circle cx="38" cy="-4" r="2.5" fill="#444" class="ant-end right-ant-end round-end" />
                        <use href="#diamond-tip" x="35.5" y="-6.5" width="5" height="5"
                            class="ant-end right-ant-end diamond-end" style="display:none;" />
                    </g>
                </g>

                <g class="eyes" pointer-events="none">
                    <circle cx="14" cy="16" r="4.5" fill="white" class="eye-outer" />
                    <circle cx="14" cy="16" r="2.8" fill="#1a1a1a" class="eye-pupil left-pupil" />
                    <circle cx="15.2" cy="14.8" r="1" fill="white" class="eye-shine" />

                    <circle cx="26" cy="16" r="4.5" fill="white" class="eye-outer" />
                    <circle cx="26" cy="16" r="2.8" fill="#1a1a1a" class="eye-pupil right-pupil" />
                    <circle cx="27.2" cy="14.8" r="1" fill="white" class="eye-shine" />

                    <!-- Blush -->
                    <circle cx="10" cy="23" r="3" fill="transparent" class="blush" opacity="0" />
                    <circle cx="30" cy="23" r="3" fill="transparent" class="blush" opacity="0" />
                </g>
                <path d="M14 28 Q20 33 26 28" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"
                    class="mouth" />
            </svg>
            <div class="gene-label hidden"></div>
        </div>
    </template>

    <!-- Template for the Pea Plant -->
    <template id="pea-template">
        <div class="blob-sprite pea-sprite" draggable="true">
            <div class="pea-visual">
                <img src="assets/images/pea/tall.svg" class="pea-img tall" alt="Tall Pea">
                <img src="assets/images/pea/short.svg" class="pea-img short hidden" alt="Short Pea">
                <img src="assets/images/pea/seed.svg" class="pea-img seed hidden" alt="Seed">
            </div>
            <div class="gene-label hidden"></div>
        </div>
    </template>

    <!-- Template for draggable Allele -->
    <template id="allele-template">
        <div class="allele-sprite" draggable="true">
            <img src="assets/images/pea/allele-dom.svg" class="allele-img dominant" alt="A">
            <img src="assets/images/pea/allele-rec.svg" class="allele-img recessive hidden" alt="a">
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>

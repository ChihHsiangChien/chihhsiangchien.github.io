<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣縣市辨識測驗</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>台灣縣市辨識測驗</h1>
            <p class="subtitle">看輪廓，猜縣市！</p>
        </header>

        <div class="game-info">
            <div class="info-item">
                <span class="label">進度：</span>
                第 <span class="value" id="progress-count">1</span> 題 / 共 <span id="total-count">22</span> 題
            </div>
            <div class="info-item" style="display: none;">
                <span class="label">時間：</span>
                <span class="value" id="timer">00:00</span>
            </div>
            <div class="btn-group">
                <button id="back-to-menu-btn" class="btn-secondary">🏠 返回選單</button>
                <button id="reset-btn" class="btn-reset">🔄 重新開始</button>
            </div>
        </div>

        <div class="game-area">
            <!-- 左側：題目區域 -->
            <div class="question-area">
                <h3>這是哪個縣市？</h3>
                <div class="county-display">
                    <svg id="question-svg" width="400" height="400" viewBox="0 0 600 700">
                        <!-- 縣市輪廓會在這裡顯示 -->
                    </svg>
                </div>

                <!-- 選項按鈕 -->
                <div class="options-container" id="options-container">
                    <!-- 選項按鈕會動態生成 -->
                </div>
            </div>

            <!-- 右側：小地圖進度 -->
            <div class="progress-area">
                <h3>完成進度</h3>
                <svg id="mini-map" width="300" height="350" viewBox="0 0 600 700">
                    <!-- 小台灣地圖會在這裡顯示 -->
                </svg>
            </div>
        </div>

        <!-- 難度選擇彈窗 -->
        <div id="difficulty-modal" class="modal hidden">
            <div class="modal-content">
                <h2>選擇挑戰等級</h2>
                <div class="difficulty-options">
                    <button class="diff-btn" data-diff="lv1">
                        <span class="diff-title">初級</span>
                        <span class="diff-desc">5 題 - 五大區域辨識</span>
                    </button>
                    <button class="diff-btn" data-diff="lv2">
                        <span class="diff-title">中級</span>
                        <span class="diff-desc">7 題 - 十大分區辨識</span>
                    </button>
                    <button class="diff-btn" data-diff="lv3">
                        <span class="diff-title">高級</span>
                        <span class="diff-desc">9 題 - 全台縣市辨識</span>
                    </button>
                    <button class="diff-btn" data-diff="lv4">
                        <span class="diff-title">專業級</span>
                        <span class="diff-desc">11 題 - 盲拼挑戰</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 勝利彈窗 -->
        <div id="victory-modal" class="modal hidden">
            <div class="modal-content">
                <h2>🎉 恭喜完成！</h2>
                <p>你成功認識了台灣所有縣市！</p>
                <p class="time-result">完成時間：<span id="final-time">00:00</span></p>
                <div class="btn-group-vertical">
                    <button id="play-again-btn" class="btn-primary">再玩一次</button>
                    <button id="menu-btn" class="btn-secondary">回到選單</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TopoJSON 處理庫 -->
    <script src="https://unpkg.com/topojson@3"></script>
    <script src="topojson-data.js"></script>
    <script src="script.js"></script>
</body>

</html>

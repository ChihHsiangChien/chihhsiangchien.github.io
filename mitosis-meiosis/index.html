<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分裂比較模擬器</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="comparison-mode">

    <header>
        <h1>分裂比較模擬器</h1>
        <div id="global-settings">
            <div class="setting-item">
                <label for="select-pairs">初始染色體對數：</label>
                <select id="select-pairs">
                    <option value="1">1 對 (2n=2)</option>
                    <option value="2" selected>2 對 (2n=4)</option>
                    <option value="3">3 對 (2n=6)</option>
                    <option value="4">4 對 (2n=8)</option>
                </select>
            </div>
            <div class="setting-item">
                <label class="switch">
                    <input type="checkbox" id="toggle-highlight">
                    <span class="slider round"></span>
                </label>
                <span>標記同源染色體</span>
            </div>
            <div class="setting-item">
                <label class="switch">
                    <input type="checkbox" id="toggle-alleles">
                    <span class="slider round"></span>
                </label>
                <span>顯示等位基因</span>
            </div>
            <div class="setting-item">
                <label class="switch">
                    <input type="checkbox" id="toggle-linkage">
                    <span class="slider round"></span>
                </label>
                <span title="連鎖：同一對染色體有多個基因">基因連鎖模式</span>
            </div>
            <div class="setting-item">
                <label class="switch">
                    <input type="checkbox" id="toggle-drag" checked>
                    <span class="slider round"></span>
                </label>
                <span>搬運模式</span>
            </div>
        </div>
    </header>

    <div id="comparison-container">
        <!-- 有絲分裂側 -->
        <div id="mitosis-section" class="simulator-section mitosis">
            <h3>細胞分裂</h3>
            <div class="canvas-container">
                <svg viewBox="0 0 800 600" id="svg-mitosis">
                    <defs>
                        <!-- Chromosome templates will be defined globally in CSS or updated via JS -->
                    </defs>
                    <path class="cell-membrane" />
                    <circle class="nucleus" cx="400" cy="300" r="220" />
                    <circle class="nucleus-left nucleus-side" cx="200" cy="300" r="145" opacity="0" />
                    <circle class="nucleus-right nucleus-side" cx="600" cy="300" r="145" opacity="0" />
                    <g class="chromosome-group"></g>
                </svg>
            </div>
            <div class="instruction-box">載入中...</div>
            <div class="controls">
                <button class="btn-prev control-btn">上一步</button>
                <button class="btn-next control-btn">下一步</button>
                <button class="btn-play control-btn">完整播放</button>
                <button class="btn-reset control-btn">重置</button>
            </div>
        </div>

        <!-- 減數分裂側 -->
        <div id="meiosis-section" class="simulator-section meiosis">
            <h3>減數分裂</h3>
            <div class="canvas-container">
                <svg viewBox="0 0 800 600" id="svg-meiosis">
                    <path class="cell-membrane" />
                    <circle class="nucleus" cx="400" cy="300" r="220" />
                    <circle class="nuc-tl nucleus-side" cx="200" cy="160" r="105" opacity="0" />
                    <circle class="nuc-bl nucleus-side" cx="200" cy="440" r="105" opacity="0" />
                    <circle class="nuc-tr nucleus-side" cx="600" cy="160" r="105" opacity="0" />
                    <circle class="nuc-br nucleus-side" cx="600" cy="440" r="105" opacity="0" />
                    <g class="chromosome-group"></g>
                </svg>
            </div>
            <div class="instruction-box">載入中...</div>
            <div class="controls">
                <button class="btn-prev control-btn">上一步</button>
                <button class="btn-next control-btn">下一步</button>
                <button class="btn-play control-btn">完整播放</button>
                <button class="btn-reset control-btn">重置</button>
            </div>
        </div>
    </div>

    <!-- Templates for dynamic generation -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <defs>
            <g id="chromatid-long">
                <g transform="rotate(-5)">
                    <rect class="chrom-body" x="-12" y="-80" width="24" height="75" rx="12" fill="currentColor" />
                </g>
                <g transform="rotate(5)">
                    <rect class="chrom-body" x="-12" y="5" width="24" height="75" rx="12" fill="currentColor" />
                </g>
                <circle cx="0" cy="0" r="7" fill="#fff" stroke="#999" stroke-width="1" />
            </g>
            <g id="chromatid-short">
                <g transform="rotate(-5)">
                    <rect class="chrom-body" x="-10" y="-45" width="20" height="40" rx="10" fill="currentColor" />
                </g>
                <g transform="rotate(5)">
                    <rect class="chrom-body" x="-10" y="5" width="20" height="40" rx="10" fill="currentColor" />
                </g>
                <circle cx="0" cy="0" r="6" fill="#fff" stroke="#999" stroke-width="1" />
            </g>
            <g id="chromatid-asym-long">
                <g transform="rotate(-5)">
                    <rect class="chrom-body" x="-12" y="-30" width="24" height="25" rx="12" fill="currentColor" />
                </g>
                <g transform="rotate(5)">
                    <rect class="chrom-body" x="-12" y="5" width="24" height="110" rx="12" fill="currentColor" />
                </g>
                <circle cx="0" cy="0" r="7" fill="#fff" stroke="#999" stroke-width="1" />
            </g>
            <g id="chromatid-asym-short">
                <g transform="rotate(-5)">
                    <rect class="chrom-body" x="-10" y="-20" width="20" height="15" rx="10" fill="currentColor" />
                </g>
                <g transform="rotate(5)">
                    <rect class="chrom-body" x="-10" y="5" width="20" height="60" rx="10" fill="currentColor" />
                </g>
                <circle cx="0" cy="0" r="6" fill="#fff" stroke="#999" stroke-width="1" />
            </g>
        </defs>
    </svg>

    <script src="script.js"></script>
</body>

</html>

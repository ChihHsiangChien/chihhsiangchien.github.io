<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Protractor Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header class="sidebar no-print">
            <h1>Protractor Gen</h1>
            <p>Create a custom size 360° protractor for transparency printing.</p>
            
            <div class="controls">
                <div class="control-group">
                    <label for="outerSize">Outer Diameter (mm)</label>
                    <div class="input-wrapper">
                        <input type="number" id="outerSize" value="100" min="10" step="1">
                        <span class="unit">mm</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="innerSize">Hole Diameter (mm)</label>
                    <div class="input-wrapper">
                        <input type="number" id="innerSize" value="10" min="0" step="1">
                        <span class="unit">mm</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="lineWidth">Line Weight</label>
                    <input type="range" id="lineWidth" min="1" max="5" value="2" step="0.5">
                </div>

                <div class="control-group">
                    <label for="fontSize">Font Scale</label>
                    <input type="range" id="fontSize" min="0.5" max="2" value="1" step="0.1">
                </div>
            </div>

            <div class="actions">
                <button id="printBtn" class="btn primary">🖨️ Print / Save PDF</button>
            </div>
            
            <div class="footer-note">
                <small>Tip: In print settings, ensure "Scale" is set to 100% or "Actual Size" to respect millimeter dimensions.</small>
            </div>
        </header>

        <main class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="protractorCanvas"></canvas>
            </div>
            <div class="ruler-guide no-print">
                <span>Display scale may vary. Print output will be exact.</span>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

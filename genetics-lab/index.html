<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遺傳實驗室 - 首頁</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="index.html" class="logo-link">
                <h1 class="logo">Gene<span>Lab</span></h1>
            </a>
            <nav>
                <a href="monohybrid.html" class="nav-item">
                    <span class="icon">🧬</span> <span>Aa 生子代</span>
                </a>
                <a href="abo.html" class="nav-item">
                    <span class="icon">🩸</span> <span>ABO 生子代</span>
                </a>
                <a href="punnett.html" class="nav-item">
                    <span class="icon">🏁</span> <span>棋盤方格</span>
                </a>
            </nav>
        </aside>
        
        <main class="content">
            <header class="tab-header">
                <h2>歡迎來到遺傳實驗室</h2>
                <p>請選擇一個實驗模組開始您的遺傳學探索之旅。</p>
            </header>
            
            <div class="portal-grid">
                <a href="monohybrid.html" class="portal-card">
                    <div class="card-icon">🧬</div>
                    <h3>單性性狀遺傳 (Aa)</h3>
                    <p>模擬孟德爾遺傳實驗，觀察顯性與隱性性狀在子代中的分佈比例。</p>
                    <div class="card-action">進入實驗室 →</div>
                </a>

                <a href="abo.html" class="portal-card">
                    <div class="card-icon">🩸</div>
                    <h3>ABO 血型遺傳</h3>
                    <p>探索人類血型的遺傳規律，了解複等位基因如何決定下一代的血型。</p>
                    <div class="card-action">進入實驗室 →</div>
                </a>

                <a href="punnett.html" class="portal-card">
                    <div class="card-icon">🏁</div>
                    <h3>棋盤方格工具</h3>
                    <p>自定義等位基因交互組合，自動生成棋盤方格圖（Punnett Square）。</p>
                    <div class="card-action">使用工具 →</div>
                </a>
            </div>
        </main>
    </div>

</html>

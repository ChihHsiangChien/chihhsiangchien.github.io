<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單性性狀遺傳 - GeneLab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-screen-lab">
        <header class="lab-header">
            <div class="title-area">
                <h2>單性性狀遺傳 (Aa)</h2>
                <p>選擇親代基因型，觀察基因如何隨染色體遺傳。</p>
            </div>
            <a href="index.html" class="back-home">
                <span class="icon">🏠</span> <span>返回大廳</span>
            </a>
        </header>
        
        <div class="simulator-layout">
            <!-- Left Side: Main Simulator -->
            <div class="lab-main-zone">
                <div class="parent-selection">
                    <div class="parent-box male">
                        <h3>父方親代 (P₁)</h3>
                        <div class="selected-display" id="male-display">Aa</div>
                        <div class="genotype-toggle-group" id="male-selector">
                            <button class="toggle-btn" data-genotype="AA">AA</button>
                            <button class="toggle-btn active" data-genotype="Aa">Aa</button>
                            <button class="toggle-btn" data-genotype="aa">aa</button>
                        </div>
                    </div>
                    
                    <div class="vs">X</div>
                    
                    <div class="parent-box female">
                        <h3>母方親代 (P₂)</h3>
                        <div class="selected-display" id="female-display">Aa</div>
                        <div class="genotype-toggle-group" id="female-selector">
                            <button class="toggle-btn" data-genotype="AA">AA</button>
                            <button class="toggle-btn active" data-genotype="Aa">Aa</button>
                            <button class="toggle-btn" data-genotype="aa">aa</button>
                        </div>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="run-monohybrid" class="primary-btn">生出一個小孩</button>
                    <button id="run-monohybrid-100" class="secondary-btn" style="border-color: var(--primary-color); color: var(--primary-color);">生出 100 個小孩</button>
                    <button id="reset-monohybrid" class="secondary-btn">重置統計</button>
                </div>

                <div class="reproduction-arena" id="arena">
                    <div class="offspring-preview" id="offspring-view"></div>
                </div>
            </div>

            <!-- Right Side: Statistics -->
            <div class="results-area">
                <div class="chart-section">
                    <h3>基因型分佈 (Genotypes)</h3>
                    <div class="chart-container" id="genotype-chart">
                        <div class="chart-item" data-id="AA">
                            <div class="chart-label">AA</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                        <div class="chart-item" data-id="Aa">
                            <div class="chart-label">Aa</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                        <div class="chart-item" data-id="aa">
                            <div class="chart-label">aa</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                    </div>
                </div>

                <div class="chart-section">
                    <h3>表現型分佈 (Phenotypes)</h3>
                    <div class="chart-container" id="phenotype-chart">
                        <div class="chart-item" data-id="dominant">
                            <div class="chart-label">顯性 [A_]</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill" style="background: var(--success); box-shadow: 0 0 10px var(--success);"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                        <div class="chart-item" data-id="recessive">
                            <div class="chart-label">隱性 [aa]</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill" style="background: var(--danger); box-shadow: 0 0 10px var(--danger);"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                    </div>
                </div>
                
                <div class="total-count">子代總數 (n): <span id="total-offspring">0</span></div>
            </div>
        </div>
    </div>
    <script src="monohybrid_logic.js"></script>
</body>
</html>

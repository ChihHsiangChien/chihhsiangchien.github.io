<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO 血型遺傳 - GeneLab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-screen-lab">
        <header class="lab-header">
            <div class="title-area">
                <h2>ABO 血型遺傳</h2>
                <p>選擇親代基因型，模擬複等位基因的遺傳過程。</p>
            </div>
            <a href="index.html" class="back-home">
                <span class="icon">🏠</span> <span>返回大廳</span>
            </a>
        </header>
        
        <div class="simulator-layout">
            <!-- Left Side: Main Simulator -->
            <div class="lab-main-zone">
                <div class="parent-selection">
                    <div class="parent-box male">
                        <h3>父方基因型 (P₁)</h3>
                        <div class="selected-display" id="male-display" style="font-size: 2.5rem; color: var(--accent);">Iᴬi</div>
                        <div class="genotype-toggle-group" id="male-selector">
                            <button class="toggle-btn" data-genotype="AA">IᴬIᴬ</button>
                            <button class="toggle-btn active" data-genotype="Ai">Iᴬi</button>
                            <button class="toggle-btn" data-genotype="BB">IᴮIᴮ</button>
                            <button class="toggle-btn" data-genotype="Bi">Iᴮi</button>
                            <button class="toggle-btn" data-genotype="AB">IᴬIᴮ</button>
                            <button class="toggle-btn" data-genotype="ii">ii</button>
                        </div>
                    </div>
                    
                    <div class="vs">X</div>
                    
                    <div class="parent-box female">
                        <h3>母方基因型 (P₂)</h3>
                        <div class="selected-display" id="female-display" style="font-size: 2.5rem; color: var(--accent);">Iᴮi</div>
                        <div class="genotype-toggle-group" id="female-selector">
                            <button class="toggle-btn" data-genotype="AA">IᴬIᴬ</button>
                            <button class="toggle-btn" data-genotype="Ai">Iᴬi</button>
                            <button class="toggle-btn" data-genotype="BB">IᴮIᴮ</button>
                            <button class="toggle-btn active" data-genotype="Bi">Iᴮi</button>
                            <button class="toggle-btn" data-genotype="AB">IᴬIᴮ</button>
                            <button class="toggle-btn" data-genotype="ii">ii</button>
                        </div>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="run-abo" class="primary-btn">生出一個小孩</button>
                    <button id="run-abo-100" class="secondary-btn" style="border-color: var(--primary-color); color: var(--primary-color);">生出 100 個小孩</button>
                    <button id="reset-abo" class="secondary-btn">重置統計</button>
                </div>

                <div class="reproduction-arena" id="arena">
                    <div class="offspring-preview" id="offspring-view" style="font-size: 1.4rem; text-align: center;"></div>
                </div>
            </div>

            <!-- Right Side: Statistics -->
            <div class="results-area">
                <div class="chart-section">
                    <h3>血型分佈 (Phenotypes)</h3>
                    <div class="chart-container" id="blood-chart">
                        <div class="chart-item" data-id="A">
                            <div class="chart-label">A 型</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill" style="background: #ef4444;"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                        <div class="chart-item" data-id="B">
                            <div class="chart-label">B 型</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill" style="background: #3b82f6;"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                        <div class="chart-item" data-id="AB">
                            <div class="chart-label">AB 型</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill" style="background: #a855f7;"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                        <div class="chart-item" data-id="O">
                            <div class="chart-label">O 型</div>
                            <div class="chart-bar-bg"><div class="chart-bar-fill" style="background: #94a3b8;"></div></div>
                            <div class="chart-value">0 (0%)</div>
                        </div>
                    </div>
                </div>
                <div class="total-count">子代總數 (n): <span id="total-offspring">0</span></div>
            </div>
        </div>
    </div>
    <script src="abo_logic.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋盤方格工具 - GeneLab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-screen-lab">
        <header class="lab-header">
            <div class="title-area">
                <h2>棋盤方格工具 (Punnett Square)</h2>
                <p>輸入親代等位基因，點擊格子觀察結合過程。</p>
            </div>
            <a href="index.html" class="back-home">
                <span class="icon">🏠</span> <span>返回大廳</span>
            </a>
        </header>
        
        <div class="punnett-tool">
            <div class="inputs">
                <div class="input-group">
                    <label>父方基因 (以空格分隔, 例: B b)</label>
                    <input type="text" id="punnett-male" placeholder="B b">
                </div>
                <div class="input-group">
                    <label>母方基因 (以空格分隔, 例: B b)</label>
                    <input type="text" id="punnett-female" placeholder="B b">
                </div>
                <button id="generate-punnett" class="primary-btn">重置方格</button>
                <button id="auto-punnett" class="secondary-btn" style="border-color: var(--primary-color); color: var(--primary-color);">自動填滿</button>
            </div>
            
            <div id="punnett-display" class="punnett-container">
                <!-- Table will be injected here -->
            </div>
        </div>
    </div>
    <script src="punnett_logic.js"></script>
</body>
</html>

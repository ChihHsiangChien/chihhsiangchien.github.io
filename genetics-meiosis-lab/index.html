<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遺傳減數分裂實驗室 - 整合視野</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Outfit:wght@300;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="app" class="integrated-layout">
        <header>
        </header>

        <div class="dashboard-grid">
            <!-- Column 1: UI Controls (Fixed & Narrow) -->
            <div class="column ui-col">
                <div class="view-section controls">
                    <div class="stage-info"><span id="current-stage-text">設定親代</span></div>
                    
                    <div class="timeline-container">
                        <div id="timeline-meiosis" class="timeline-group">
                            <div class="timeline-header">減數分裂流程 (n)</div>
                            <div class="timeline-item active" data-step="0">親代基因型設定</div>
                            <div class="timeline-item" data-step="1">DNA 複製</div>
                            <div class="timeline-item" data-step="2">同源染色體配對</div>
                            <div class="timeline-item" data-step="3">同源染色體分離</div>
                            <div class="timeline-item" data-step="4">染色體中央排列</div>
                            <div class="timeline-item" data-step="5">姊妹染色分體分離</div>
                            <div class="timeline-item" data-step="6">配子產生</div>
                        </div>

                        <div id="timeline-development" class="timeline-group dimmed">
                            <div class="timeline-header">胚胎發育流程 (2n)</div>
                            <div class="timeline-item" data-devstep="0">配子結合</div>
                            <div class="timeline-item" data-devstep="1">DNA 複製</div>
                            <div class="timeline-item" data-devstep="2">有絲分裂中期</div>
                            <div class="timeline-item" data-devstep="3">有絲分裂後期</div>
                            <div class="timeline-item" data-devstep="4">二細胞期</div>
                            <div class="timeline-item" data-devstep="5">四細胞期</div>
                            <div class="timeline-item" data-devstep="6">十二細胞期</div>
                            <div class="timeline-item" data-devstep="7">桑葚胚期</div>
                            <div class="timeline-item" data-devstep="8">個體發育完成</div>
                        </div>
                    </div>

                    <div class="action-area">
                        <button id="btn-start-meiosis" class="primary-btn pulse">啟動減數分裂</button>
                        
                        <div class="meiosis-step-tools hidden">
                            <div class="step-nav">
                                <button id="btn-meiosis-prev" class="icon-btn" title="上一步">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span id="meiosis-step-label" class="step-label">階段 0</span>
                                <button id="btn-meiosis-next" class="icon-btn" title="下一步">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>

                        <button id="btn-fertilize" class="primary-btn hidden">確認受精發育</button>

                        <div id="dev-step-tools" class="meiosis-step-tools hidden">
                            <div class="step-nav">
                                <button id="btn-dev-prev" class="icon-btn" title="上一步">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span id="dev-step-label" class="step-label">階段 0</span>
                                <button id="btn-dev-next" class="icon-btn" title="下一步">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>

                        <button id="btn-reset" class="secondary-btn">重置實驗</button>
                    </div>
                </div>
            </div>

            <!-- Column 2: Father (Macro & Micro) -->
            <div class="column side father-col">
                <div class="view-section macro">
                    <h3>父本</h3>
                    <div class="blob-display" id="macro-father"></div>
                    <div class="genotype-selector">
                        <button data-genotype="AA" data-parent="father">AA</button>
                        <button data-genotype="Aa" data-parent="father" class="active">Aa</button>
                        <button data-genotype="aa" data-parent="father">aa</button>
                    </div>
                </div>
                <div class="view-section micro">
                    <div class="area-label">產生配子</div>
                    <svg viewBox="0 0 400 300" id="svg-meiosis-father" class="meiosis-svg">
                        <path class="cell-membrane" />
                        <circle class="nucleus" cx="200" cy="150" r="120" />
                        <g class="chromosome-group"></g>
                    </svg>
                </div>
            </div>

            <!-- Column 3: Mother (Macro & Micro) -->
            <div class="column side mother-col">
                <div class="view-section macro">
                    <h3>母本</h3>
                    <div class="blob-display" id="macro-mother"></div>
                    <div class="genotype-selector">
                        <button data-genotype="AA" data-parent="mother">AA</button>
                        <button data-genotype="Aa" data-parent="mother" class="active">Aa</button>
                        <button data-genotype="aa" data-parent="mother">aa</button>
                    </div>
                </div>
                <div class="view-section micro">
                    <div class="area-label">產生配子</div>
                    <svg viewBox="0 0 400 300" id="svg-meiosis-mother" class="meiosis-svg">
                        <path class="cell-membrane" />
                        <circle class="nucleus" cx="200" cy="150" r="120" />
                        <g class="chromosome-group"></g>
                    </svg>
                </div>
            </div>

            <!-- Column 4: Offspring (Macro & Micro) -->
            <div class="column side offspring-col">
                <div class="view-section macro">
                    <h3>子代 (Offspring)</h3>
                    <div id="offspring-macro" class="empty-state">
                        <div class="blob-display" id="macro-child">
                            <span class="placeholder-text">等待受精與發育...</span>
                        </div>
                        <div class="child-info">
                            <span class="geno-tag"></span>
                            <span class="pheno-tag"></span>
                        </div>
                    </div>
                </div>
                <div class="view-section micro fertilization-zone">
                    <div class="area-label">受精與發育 (2n)</div>
                    
                    <div class="zygote-nuclear-view">
                        <svg viewBox="0 0 400 300" id="svg-zygote">
                            <path class="cell-membrane" />
                            <g class="chromosome-group"></g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="blob-template">
        <div class="blob-sprite">
            <svg viewBox="-10 -15 60 70" class="blob-svg">
                <circle cx="20" cy="20" r="18" class="blob-body" />
                <g class="eyes">
                    <circle cx="14" cy="16" r="4.5" fill="white" />
                    <circle cx="14" cy="16" r="2.8" fill="#1a1a1a" />
                    <circle cx="26" cy="16" r="4.5" fill="white" />
                    <circle cx="26" cy="16" r="2.8" fill="#1a1a1a" />
                </g>
                <path d="M14 28 Q20 33 26 28" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />
            </svg>
            <div class="gene-label"></div>
        </div>
    </template>

    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <defs>
            <g id="chromatid-template">
                <g transform="rotate(-5)">
                    <rect class="chrom-body" x="-14" y="-55" width="28" height="50" rx="14" fill="currentColor" />
                </g>
                <g transform="rotate(5)">
                    <rect class="chrom-body" x="-14" y="5" width="28" height="50" rx="14" fill="currentColor" />
                </g>
                <circle cx="0" cy="0" r="7" fill="#fff" stroke="#999" stroke-width="1.5" />
                <rect x="-12" y="-35" width="24" height="18" fill="rgba(255,255,255,0.6)" rx="5" />
                <text x="0" y="-22" class="gene-text" text-anchor="middle" font-size="20" font-weight="900"></text>
            </g>
            <radialGradient id="embryoGradient" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#fff" stop-opacity="1" />
                <stop offset="50%" stop-color="#4a90e2" stop-opacity="1" />
                <stop offset="100%" stop-color="#2c3e50" stop-opacity="1" />
            </radialGradient>
        </defs>
    </svg>

    <script src="script.js"></script>
</body>

</html>

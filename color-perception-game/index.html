<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Perception Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <aside class="side-panel">
            <header>
                <h1>色彩辨識挑戰</h1>
                <div class="timer-display">時間: <span id="time">10</span>s</div>
            </header>

            <div class="stats-panel">
                <div class="stat-item">關卡: <span id="level">1</span></div>
                <div class="stat-item">分數: <span id="score">0</span></div>
                <div class="stat-item">生命: <span id="lives">3</span></div>
            </div>

            <div class="controls">
                <button id="startButton" class="primary-btn">開始</button>
                <button id="pauseButton" class="secondary-btn" disabled>暫停</button>
            </div>

            <div class="power-ups">
                <button id="hintButton" class="power-btn" disabled>提示</button>
                <button id="slowButton" class="power-btn" disabled>慢一點</button>
            </div>
        </aside>

        <main class="game-board" id="gameBoard"></main>
    </div>
    <script src="game.js"></script>
</body>

</html>
